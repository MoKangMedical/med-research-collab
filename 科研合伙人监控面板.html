<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研项目实时监控 - 刘亦菲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: #f8f9fa;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        /* 头部区域 - 优化刘亦菲照片显示 */
        .header {
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            color: #333;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #e9ecef;
        }
        
        /* 移除粉红色背景，使用刘亦菲照片作为主要背景 */
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('./刘亦菲照片2.jpg');
            background-size: cover;
            background-position: center 30%;
            filter: brightness(1) blur(0px); /* 移除模糊，让照片更清晰 */
            z-index: 1;
            opacity: 0.15; /* 降低透明度，作为背景但不遮挡内容 */
        }
        
        /* 移除粉红色渐变叠加 */
        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.85); /* 使用白色半透明叠加，让文字更清晰 */
            z-index: 2;
        }
        
        .profile-container {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 20px;
            position: relative;
            z-index: 3;
        }
        
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            object-fit: cover;
            object-position: center 30%;
            transition: all 0.3s ease;
            background: white; /* 添加白色背景确保照片边缘清晰 */
        }
        
        .profile-photo:hover {
            transform: scale(1.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 1);
        }
        
        .profile-text {
            text-align: left;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        .profile-name {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #2d3436;
            text-shadow: 1px 1px 3px rgba(255, 255, 255, 0.8);
        }
        
        .profile-title {
            font-size: 1.2rem;
            color: #6c757d;
            font-weight: 500;
            line-height: 1.4;
        }
        
        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-top: 20px;
            position: relative;
            z-index: 3;
            color: #2d3436;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        
        /* 自动化状态栏 - 使用更专业的颜色 */
        .automation-bar {
            background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%);
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .automation-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4cd964;
            animation: pulse 2s infinite;
        }
        
        .status-text {
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        .automation-times {
            display: flex;
            gap: 20px;
            font-size: 0.9rem;
        }
        
        .time-slot {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .time-icon {
            font-size: 1.1rem;
        }
        
        /* 顶部统计栏 */
        .stats-bar {
            background: white;
            padding: 20px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 25px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .stat-box {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
        }
        
        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            border-color: #3498db;
        }
        
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #3498db;
            margin-bottom: 8px;
        }
        
        .stat-label {
            font-size: 1rem;
            color: #6c757d;
            font-weight: 500;
        }
        
        /* 项目监控主区域 */
        .projects-container {
            padding: 40px;
        }
        
        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }
        
        .section-title-icon {
            font-size: 2rem;
            color: #3498db;
        }
        
        /* 项目网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .project-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .project-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            border-color: #3498db;
        }
        
        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        
        .project-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2d3436;
            flex: 1;
            margin-right: 15px;
            line-height: 1.3;
        }
        
        .project-status {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-planning {
            background: rgba(255, 193, 7, 0.15);
            color: #e6b400;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        
        .status-active {
            background: rgba(76, 217, 100, 0.15);
            color: #27ae60;
            border: 1px solid rgba(76, 217, 100, 0.3);
        }
        
        .status-paused {
            background: rgba(255, 149, 0, 0.15);
            color: #f39c12;
            border: 1px solid rgba(255, 149, 0, 0.3);
        }
        
        .status-completed {
            background: rgba(90, 200, 250, 0.15);
            color: #3498db;
            border: 1px solid rgba(90, 200, 250, 0.3);
        }
        
        .project-description {
            color: #6c757d;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 25px;
            min-height: 70px;
        }
        
        /* 项目进度条 */
        .project-progress-section {
            margin-bottom: 25px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .progress-label {
            color: #6c757d;
            font-weight: 500;
        }
        
        .progress-percent {
            color: #2d3436;
            font-weight: 600;
        }
        
        .progress-bar-container {
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        
        .progress-bar-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 0.5s ease;
        }
        
        .progress-color-planning { background: linear-gradient(90deg, #ffc107, #ffd54f); }
        .progress-color-active { background: linear-gradient(90deg, #4cd964, #5ac8fa); }
        .progress-color-paused { background: linear-gradient(90deg, #ff9500, #ffb74d); }
        .progress-color-completed { background: linear-gradient(90deg, #5ac8fa, #667eea); }
        
        /* 项目元信息 */
        .project-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #6c757d;
        }
        
        .meta-icon {
            font-size: 1.1rem;
            color: #3498db;
        }
        
        /* 项目详情展开 */
        .project-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            margin-top: 20px;
            border-top: 1px solid #e9ecef;
            padding-top: 20px;
        }
        
        .project-details.expanded {
            max-height: 600px;
        }
        
        .details-section {
            margin-bottom: 20px;
        }
        
        .details-title {
            font-size: 1rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .details-content {
            font-size: 0.9rem;
            color: #6c757d;
            line-height: 1.6;
            padding-left: 25px;
        }
        
        /* 项目操作按钮 */
        .project-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        
        .project-btn {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .project-btn-details {
            background: #f8f9fa;
            color: #6c757d;
            border: 1px solid #e9ecef;
        }
        
        .project-btn-details:hover {
            background: #e9ecef;
            color: #2d3436;
            border-color: #3498db;
        }
        
        .project-btn-update {
            background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%);
            color: white;
        }
        
        .project-btn-update:hover {
            background: linear-gradient(135deg, #2980b9 0%, #1a252f 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.3);
        }
        
        /* 实时更新区域 */
        .live-updates-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-top: 40px;
            border: 1px solid #e9ecef;
        }
        
        .updates-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .updates-icon {
            font-size: 1.6rem;
            color: #3498db;
        }
        
        .updates-container {
            max-height: 350px;
            overflow-y: auto;
            padding-right: 15px;
        }
        
        .update-item {
            padding: 15px 20px;
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 5px solid #3498db;
            transition: all 0.2s ease;
        }
        
        .update-item:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }
        
        .update-time {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .update-message {
            font-size: 1rem;
            color: #2d3436;
            line-height: 1.5;
        }
        
        .update-success { border-left-color: #4cd964; }
        .update-info { border-left-color: #5ac8fa; }
        .update-warning { border-left-color: #ff9500; }
        
        /* 控制按钮 */
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e9ecef;
        }
        
        .control-btn {
            padding: 15px 35px;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-refresh {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-refresh:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.3);
        }
        
        .btn-new-project {
            background: linear-gradient(135deg, #4cd964 0%, #5ac8fa 100%);
            color: white;
        }
        
        .btn-new-project:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(76, 217, 100, 0.3);
        }
        
        .btn-test-auto {
            background: linear-gradient(135deg, #3498db 0%, #2c3e50 100%);
            color: white;
        }
        
        .btn-test-auto:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(52, 152, 219, 0.3);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .project-meta {
                grid-template-columns: 1fr;
            }
            
            .header {
                padding: 25px;
                min-height: 220px;
            }
            
            .main-title {
                font-size: 1.8rem;
                padding: 12px 20px;
            }
            
            .profile-photo {
                width: 90px;
                height: 90px;
            }
            
            .profile-name {
                font-size: 1.8rem;
            }
            
            .stats-bar {
                grid-template-columns: 1fr;
                padding: 15px 25px;
            }
            
            .projects-container {
                padding: 25px;
            }
            
            .control-buttons {
                flex-direction: column;
                gap: 15px;
            }
            
            .control-btn {
                width: 100%;
            }
            
            .automation-bar {
                flex-direction: column;
                align-items: flex-start;
                padding: 15px 25px;
            }
            
            .automation-times {
                flex-direction: column;
                gap: 12px;
            }
        }
        
        /* 动画 */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .slide-in {
            animation: slideIn 0.6s ease forwards;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
    </style>
</head>

        // 切换项目详情显示
        function toggleProjectDetails(projectId) {
            const detailsElement = document.getElementById(`details-${projectId}`);
            const button = event.target;
            
            detailsElement.classList.toggle('expanded');
            
            const project = projects.find(p => p.id === projectId);
            if (detailsElement.classList.contains('expanded')) {
                button.textContent = '收起详情';
                addUpdate(`展开项目详情：${project.title}`, "info");
            } else {
                button.textContent = '查看详情';
            }
        }
        
        // 渲染更新记录
        function renderUpdates() {
            const updatesContainer = document.getElementById('updatesContainer');
            updatesContainer.innerHTML = '';
            
            updates.forEach(update => {
                const updateItem = document.createElement('div');
                updateItem.className = `update-item update-${update.type} fade-in`;
                updateItem.innerHTML = `
                    <div class="update-time">
                        <span>🕒</span>
                        <span>${update.time}</span>
                    </div>
                    <div class="update-message">${update.message}</div>
                `;
                updatesContainer.appendChild(updateItem);
            });
        }
        
        // 更新统计信息
        function updateStatistics() {
            const totalProjects = projects.length;
            const activeProjects = projects.filter(p => p.status === 'active').length;
            const avgProgress = Math.round(projects.reduce((sum, p) => sum + p.progress, 0) / projects.length);
            const pendingTasks = projects.reduce((sum, p) => sum + (p.tasks - p.completedTasks), 0);
            const successRate = Math.round((projects.filter(p => p.status === 'completed').length / projects.length) * 100);
            
            document.getElementById('totalProjects').textContent = totalProjects;
            document.getElementById('activeProjects').textContent = activeProjects;
            document.getElementById('avgProgress').textContent = `${avgProgress}%`;
            document.getElementById('pendingTasks').textContent = pendingTasks;
            document.getElementById('successRate').textContent = `${successRate}%`;
        }
        
        // 查看项目详情
        function viewProjectDetails(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const status = statusMap[project.status];
                const priority = priorityMap[project.priority];
                
                const details = `

${getTimeRemaining(project.endDate)}

                alert(details);

            }
        }
        
        // 更新项目进度
        function updateProjectProgress(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const newProgress = prompt(`请输入【${project.title}】的新进度 (0-100):`, project.progress);
                if (newProgress !== null) {
                    const progress = parseInt(newProgress);
                    if (!isNaN(progress) && progress >= 0 && progress <= 100) {
                        const oldProgress = project.progress;
                        project.progress = progress;
                        project.completedTasks = Math.floor((progress / 100) * project.tasks);
                        project.lastUpdated = getCurrentDateTime();
                        
                        // 更新状态
                        if (progress >= 100) {
                            project.status = 'completed';
                            addUpdate(`🎉 项目完成：${project.title}`, "success");
                        } else if (progress > 0 && project.status === 'planning') {
                            project.status = 'active';
                            addUpdate(`🚀 项目启动：${project.title}`, "success");
                        }
                        
                        renderProjects();
                        addUpdate(`📈 项目进度更新：${project.title} ${oldProgress}% → ${progress}%`, "info");
                    } else {
                        alert("请输入有效的进度值 (0-100)");
                    }
                }
            }
        }
        
        // 刷新所有项目状态
        function refreshAllProjects() {
            projects.forEach(project => {
                if (project.status === 'active' && project.progress < 100) {
                    // 模拟随机进度更新
                    const increase = Math.floor(Math.random() * 5) + 1;
                    const oldProgress = project.progress;
                    project.progress = Math.min(100, project.progress + increase);
                    project.completedTasks = Math.floor((project.progress / 100) * project.tasks);
                    project.lastUpdated = getCurrentDateTime();
                    
                    if (project.progress >= 100) {
                        project.status = 'completed';
                        addUpdate(`🎉 项目自动完成：${project.title}`, "success");
                    } else if (project.progress > oldProgress) {
                        addUpdate(`🔄 项目进度自动更新：${project.title} +${increase}%`, "info");
                    }
                }
            });
            
            renderProjects();
            addUpdate("🔄 所有项目状态已刷新", "info");
        }
        
        // 创建新项目
        function createNewProject() {
            const title = prompt("请输入新项目标题：");
            if (!title) return;
            
            const description = prompt("请输入项目描述：", "新的医学科研合作项目");
            if (!description) return;
            
            const startDate = new Date().toISOString().split('T')[0];
            const endDate = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            const newProject = {
                id: projects.length + 1,

                description: description,
                status: "planning",
                progress: 0,
                startDate: startDate,
                endDate: endDate,

        // 添加更新记录
        function addUpdate(message, type = "info") {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0];
            
            const newUpdate = {
                id: updates.length + 1,
                time: timeString,
                message: message,
                type: type
            };
            
            updates.unshift(newUpdate);
            if (updates.length > 10) updates.pop();
            
            renderUpdates();
        }
        
        // 辅助函数
        function getCurrentDateTime() {
            const now = new Date();
            return now.toISOString().split('T')[0] + ' ' + now.toTimeString().split(' ')[0];
        }
        
        function getTimeRemaining(endDate) {
            const end = new Date(endDate);
            const now = new Date();
            const diff = end - now;
            
            if (diff <= 0) return "已结束";
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days > 30) {
                const months = Math.floor(days / 30);
                return `剩余时间：约${months}个月`;
            } else if (days > 0) {
                return `剩余时间：${days}天`;
            } else {
                const hours = Math.floor(diff / (1000 * 60 * 60));
                return `剩余时间：${hours}小时`;
            }
        }
        
        // 模拟实时更新
        function simulateLiveUpdates() {
            setInterval(() => {
                // 随机选择一个活跃项目进行自动更新
                const activeProjects = projects.filter(p => p.status === 'active');
                if (activeProjects.length > 0) {
                    const randomProject = activeProjects[Math.floor(Math.random() * activeProjects.length)];
                    if (randomProject.progress < 100) {
                        const increase = Math.floor(Math.random() * 3) + 1;
                        const oldProgress = randomProject.progress;
                        randomProject.progress = Math.min(100, randomProject.progress + increase);
                        randomProject.completedTasks = Math.floor((randomProject.progress / 100) * randomProject.tasks);
                        randomProject.lastUpdated = getCurrentDateTime();
                        
                        if (randomProject.progress >= 100) {
                            randomProject.status = 'completed';
                            addUpdate(`🎉 项目自动完成：${randomProject.title}`, "success");
                        } else if (randomProject.progress > oldProgress) {
                            addUpdate(`📊 项目自动更新：${randomProject.title} 进度+${increase}%`, "info");
                        }
                        
                        renderProjects();
                    }
                }
            }, 60000); // 每分钟更新一次
        }

            renderProjects();
            renderUpdates();
            simulateLiveUpdates();
