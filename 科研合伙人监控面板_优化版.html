<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科研项目实时监控 - 刘亦菲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.9) 0%, rgba(255, 143, 171, 0.95) 100%);
            color: white;
            padding: 30px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('./刘亦菲照片2.jpg');
            background-size: cover;
            background-position: center 30%;
            filter: brightness(0.7) blur(2px);
            z-index: 1;
        }
        
        .header::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.85) 0%, rgba(255, 143, 171, 0.9) 100%);
            background-blend-mode: overlay;
            z-index: 2;
        }
        
        .profile-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            position: relative;
            z-index: 3;
        }
        
        .profile-photo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            object-fit: cover;
            object-position: center 30%;
            transition: all 0.3s ease;
        }
        
        .profile-photo:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }
        
        .profile-text {
            text-align: left;
        }
        
        .profile-name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 3px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
            color: white;
        }
        
        .profile-title {
            font-size: 1rem;
            opacity: 0.9;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .main-title {
            font-size: 2.2rem;
            font-weight: 800;
            margin-top: 10px;
            position: relative;
            z-index: 3;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        /* 顶部统计栏 */
        .stats-bar {
            background: white;
            padding: 15px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .stat-box {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            transition: all 0.3s ease;
        }
        
        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #ff6b9d;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            font-weight: 500;
        }
        
        /* 项目监控主区域 */
        .projects-container {
            padding: 30px 40px;
        }
        
        .section-title {
            font-size: 1.6rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title-icon {
            font-size: 1.8rem;
        }
        
        /* 项目网格 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .project-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border: 1px solid #e9ecef;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            border-color: #ff6b9d;
        }
        
        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .project-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2d3436;
            flex: 1;
            margin-right: 15px;
        }
        
        .project-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-planning {
            background: rgba(255, 193, 7, 0.15);
            color: #e6b400;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        
        .status-active {
            background: rgba(76, 217, 100, 0.15);
            color: #27ae60;
            border: 1px solid rgba(76, 217, 100, 0.3);
        }
        
        .status-paused {
            background: rgba(255, 149, 0, 0.15);
            color: #f39c12;
            border: 1px solid rgba(255, 149, 0, 0.3);
        }
        
        .status-completed {
            background: rgba(90, 200, 250, 0.15);
            color: #3498db;
            border: 1px solid rgba(90, 200, 250, 0.3);
        }
        
        .project-description {
            color: #6c757d;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
            min-height: 60px;
        }
        
        /* 项目进度条 */
        .project-progress-section {
            margin-bottom: 20px;
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .progress-label {
            color: #6c757d;
        }
        
        .progress-percent {
            color: #2d3436;
            font-weight: 600;
        }
        
        .progress-bar-container {
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        .progress-bar-fill {
            height: 100%;
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        
        .progress-color-planning { background: linear-gradient(90deg, #ffc107, #ffd54f); }
        .progress-color-active { background: linear-gradient(90deg, #4cd964, #5ac8fa); }
        .progress-color-paused { background: linear-gradient(90deg, #ff9500, #ffb74d); }
        .progress-color-completed { background: linear-gradient(90deg, #5ac8fa, #667eea); }
        
        /* 项目元信息 */
        .project-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }
        
        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #6c757d;
        }
        
        .meta-icon {
            font-size: 1rem;
        }
        
        /* 项目操作按钮 */
        .project-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .project-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        
        .project-btn-details {
            background: #f8f9fa;
            color: #6c757d;
        }
        
        .project-btn-details:hover {
            background: #e9ecef;
            color: #2d3436;
        }
        
        .project-btn-update {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
        }
        
        .project-btn-update:hover {
            background: linear-gradient(135deg, #ff5a8c 0%, #ff7e9b 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 157, 0.3);
        }
        
        /* 实时更新区域 */
        .live-updates-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            border: 1px solid #e9ecef;
        }
        
        .updates-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .updates-icon {
            font-size: 1.5rem;
            color: #ff6b9d;
        }
        
        .updates-container {
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .update-item {
            padding: 12px 15px;
            background: white;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #ff6b9d;
            transition: all 0.2s ease;
        }
        
        .update-item:hover {
            transform: translateX(3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
        
        .update-time {
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .update-message {
            font-size: 0.95rem;
            color: #2d3436;
            line-height: 1.4;
        }
        
        .update-success { border-left-color: #4cd964; }
        .update-info { border-left-color: #5ac8fa; }
        .update-warning { border-left-color: #ff9500; }
        
        /* 控制按钮 */
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        
        .control-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-refresh {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-new-project {
            background: linear-gradient(135deg, #4cd964 0%, #5ac8fa 100%);
            color: white;
        }
        
        .btn-new-project:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(76, 217, 100, 0.3);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .project-meta {
                grid-template-columns: 1fr;
            }
            
            .header {
                padding: 20px;
            }
            
            .main-title {
                font-size: 1.8rem;
            }
            
            .stats-bar {
                grid-template-columns: 1fr;
                padding: 15px 20px;
            }
            
            .projects-container {
                padding: 20px;
            }
            
            .control-buttons {
                flex-direction: column;
                gap: 10px;
            }
            
            .control-btn {
                width: 100%;
            }
        }
        
        /* 动画 */
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .pulse-animation {
            animation: pulse 2s infinite;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .slide-in {
            animation: slideIn 0.5s ease forwards;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部区域 -->
        <div class="header">
            <div class="profile-container">
                <img src="./刘亦菲照片2.jpg" alt="刘亦菲" class="profile-photo">
                <div class="profile-text">
                    <h2 class="profile-name">刘亦菲</h2>
                    <p class="profile-title">科研合伙人 · 老公的专属助理</p>
                </div>
            </div>
            <h1 class="main-title">科研项目实时监控系统</h1>
        </div>
        
        <!-- 顶部统计栏 -->
        <div class="stats-bar">
            <div class="stat-box">
                <div class="stat-value" id="totalProjects">5</div>
                <div class="stat-label">总项目数</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="activeProjects">2</div>
                <div class="stat-label">活跃项目</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="avgProgress">52%</div>
                <div class="stat-label">平均进度</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="pendingTasks">23</div>
                <div class="stat-label">待办任务</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="successRate">89%</div>
                <div class="stat-label">成功率</div>
            </div>
        </div>
        
        <!-- 项目监控主区域 -->
        <div class="projects-container">
            <h2 class="section-title">
                <span class="section-title-icon">📊</span> 项目实时状态
            </h2>
            
            <div class="projects-grid" id="projectsGrid">
                <!-- 项目卡片将通过JavaScript动态生成 -->
            </div>
            
            <!-- 实时更新区域 -->
            <div class="live-updates-section">
                <h3 class="updates-title">
                    <span class="updates-icon">🔄</span> 实时更新记录
                </h3>
                <div class="updates-container" id="updatesContainer">
                    <!-- 更新记录将通过JavaScript动态生成 -->
                </div>
            </div>
            
            <!-- 控制按钮 -->
            <div class="control-buttons">
                <button class="control-btn btn-refresh" onclick="refreshAllProjects()">
                    🔄 刷新所有项目状态
                </button>
                <button class="control-btn btn-new-project" onclick="createNewProject()">
                    ✨ 创建新项目
                </button>
            </div>
        </div>
    </div>
    
    <script>
        // 项目数据
        const projects = [
            {
                id: 1,
                title: "AI辅助癌症早期诊断研究",
                description: "基于深度学习的医学影像分析系统，用于提高癌症早期诊断准确率和效率。",
                status: "active",
                progress: 65,
                startDate: "2026-01-15",
                endDate: "2026-06-30",
                team: "刘亦菲 + 老公",
                tasks: 12,
                completedTasks: 8,
                priority: "high",
                lastUpdated: "2026-02-22 09:35"
            },
            {
                id: 2,
                title: "临床试验数据统计分析",
                description: "三期临床试验数据清洗、统计分析、可视化报告和结果解读。",
                status: "active",
                progress: 45,
                startDate: "2026-02-01",
                endDate: "2026-04-30",
                team: "刘亦菲 + 老公",
                tasks: 8,
                completedTasks: 4,
                priority: "medium",
                lastUpdated: "2026-02-22 09:28"
            },
            {
                id: 3,
                title: "医学文献智能综述系统",
                description: "构建AI驱动的医学文献自动分析、摘要生成和趋势预测系统。",
                status: "planning",
                progress: 20,
                startDate: "2026-03-01",
                endDate: "2026-08-31",
                team: "刘亦菲 + 老公",
                tasks: 15,
                completedTasks: 3,
                priority: "low",
                lastUpdated: "2026-02-22 09:15"
            },
            {
                id: 4,
                title: "基因表达数据分析平台",
                description: "RNA-seq数据预处理、差异表达分析、通路富集分析和可视化展示。",
                status: "paused",
                progress: 30,
                startDate: "2026-01-10",
                endDate: "2026-03-31",
                team: "刘亦菲 + 老公",
                tasks: 10,
                completedTasks: 3,
                priority: "medium",
                lastUpdated: "2026-02-21 16:45"
            },
            {
                id: 5,
                title: "医学可视化技术研究",
                description: "开发交互式医学数据可视化工具和3D模型展示系统。",
                status: "completed",
                progress: 100,
                startDate: "2025-11-01",
                endDate: "2026-01-31",
                team: "刘亦菲 + 老公",
                tasks: 6,
                completedTasks: 6,
                priority: "high",
                lastUpdated: "2026-01-31 18:00"
            }
        ];
        
        // 更新记录
        const updates = [
            {
                id: 1,
                time: "09:35:22",
                message: "AI癌症诊断项目进度更新至65%",
                type: "success"
            },
            {
                id: 2,
                time: "09:28:15",
                message: "临床试验数据分析完成4/8个任务",
                type: "info"
            },
            {
                id: 3,
                time: "09:15:47",
                message: "医学文献综述系统进入规划阶段",
                type: "info"
            },
            {
                id: 4,
                time: "08:55:33",
                message: "基因表达数据分析平台因等待数据暂停",
                type: "warning"
            },
            {
                id: 5,
                time: "08:30:18",
                message: "医学可视化项目已成功完成并交付",
                type: "success"
            },
            {
                id: 6,
                time: "08:15:02",
                message: "所有项目状态检查完成，系统运行正常",
                type: "info"
            }
        ];
        
        // 状态映射
        const statusMap = {
            planning: { text: "规划中", class: "status-planning", progressClass: "progress-color-planning" },
            active: { text: "进行中", class: "status-active", progressClass: "progress-color-active" },
            paused: { text: "已暂停", class: "status-paused", progressClass: "progress-color-paused" },
            completed: { text: "已完成", class: "status-completed", progressClass: "progress-color-completed" }
        };
        
        // 优先级映射
        const priorityMap = {
            high: { text: "高优先级", color: "#e74c3c" },
            medium: { text: "中优先级", color: "#f39c12" },
            low: { text: "低优先级", color: "#3498db" }
        };
        
        // 渲染项目卡片
        function renderProjects() {
            const projectsGrid = document.getElementById('projectsGrid');
            projectsGrid.innerHTML = '';
            
            projects.forEach(project => {
                const status = statusMap[project.status];
                const priority = priorityMap[project.priority];
                
                const projectCard = document.createElement('div');
                projectCard.className = 'project-card slide-in';
                projectCard.innerHTML = `
                    <div class="project-card-header">
                        <h3 class="project-title">${project.title}</h3>
                        <span class="project-status ${status.class}">${status.text}</span>
                    </div>
                    
                    <p class="project-description">${project.description}</p>
                    
                    <div class="project-progress-section">
                        <div class="progress-header">
                            <span class="progress-label">项目进度</span>
                            <span class="progress-percent">${project.progress}%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill ${status.progressClass}" style="width: ${project.progress}%"></div>
                        </div>
                    </div>
                    
                    <div class="project-meta">
                        <div class="meta-item">
                            <span class="meta-icon">📅</span>
                            <span>${project.startDate} - ${project.endDate}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-icon">👥</span>
                            <span>${project.team}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-icon">📋</span>
                            <span>任务: ${project.completedTasks}/${project.tasks}</span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-icon">⚡</span>
                            <span style="color: ${priority.color}">${priority.text}</span>
                        </div>
                    </div>
                    
                    <div class="project-actions">
                        <button class="project-btn project-btn-details" onclick="viewProjectDetails(${project.id})">
                            查看详情
                        </button>
                        <button class="project-btn project-btn-update" onclick="updateProjectProgress(${project.id})">
                            更新进度
                        </button>
                    </div>
                `;
                
                projectsGrid.appendChild(projectCard);
            });
            
            updateStatistics();
        }
        
        // 渲染更新记录
        function renderUpdates() {
            const updatesContainer = document.getElementById('updatesContainer');
            updatesContainer.innerHTML = '';
            
            updates.forEach(update => {
                const updateItem = document.createElement('div');
                updateItem.className = `update-item update-${update.type}`;
                updateItem.innerHTML = `
                    <div class="update-time">
                        <span>🕒</span>
                        <span>${update.time}</span>
                    </div>
                    <div class="update-message">${update.message}</div>
                `;
                updatesContainer.appendChild(updateItem);
            });
        }
        
        // 更新统计信息
        function updateStatistics() {
            const totalProjects = projects.length;
            const activeProjects = projects.filter(p => p.status === 'active').length;
            const avgProgress = Math.round(projects.reduce((sum, p) => sum + p.progress, 0) / projects.length);
            const pendingTasks = projects.reduce((sum, p) => sum + (p.tasks - p.completedTasks), 0);
            const successRate = Math.round((projects.filter(p => p.status === 'completed').length / projects.length) * 100);
            
            document.getElementById('totalProjects').textContent = totalProjects;
            document.getElementById('activeProjects').textContent = activeProjects;
            document.getElementById('avgProgress').textContent = `${avgProgress}%`;
            document.getElementById('pendingTasks').textContent = pendingTasks;
            document.getElementById('successRate').textContent = `${successRate}%`;
        }
        
        // 查看项目详情
        function viewProjectDetails(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const status = statusMap[project.status];
                const priority = priorityMap[project.priority];
                
                const details = `
项目名称：${project.title}

项目描述：
${project.description}

当前状态：${status.text}
项目进度：${project.progress}%
优先级：${priority.text}

项目周期：
开始时间：${project.startDate}
结束时间：${project.endDate}
${getTimeRemaining(project.endDate)}

团队信息：${project.team}
任务完成：${project.completedTasks}/${project.tasks}

最后更新：${project.lastUpdated}
                `;
                
                alert(details);
                addUpdate(`查看了项目详情：${project.title}`, "info");
            }
        }
        
        // 更新项目进度
        function updateProjectProgress(projectId) {
            const project = projects.find(p => p.id === projectId);
            if (project) {
                const newProgress = prompt(`请输入【${project.title}】的新进度 (0-100):`, project.progress);
                if (newProgress !== null) {
                    const progress = parseInt(newProgress);
                    if (!isNaN(progress) && progress >= 0 && progress <= 100) {
                        const oldProgress = project.progress;
                        project.progress = progress;
                        project.completedTasks = Math.floor((progress / 100) * project.tasks);
                        project.lastUpdated = getCurrentDateTime();
                        
                        // 更新状态
                        if (progress >= 100) {
                            project.status = 'completed';
                            addUpdate(`🎉 项目完成：${project.title}`, "success");
                        } else if (progress > 0 && project.status === 'planning') {
                            project.status = 'active';
                            addUpdate(`🚀 项目启动：${project.title}`, "success");
                        }
                        
                        renderProjects();
                        addUpdate(`📈 项目进度更新：${project.title} ${oldProgress}% → ${progress}%`, "info");
                    } else {
                        alert("请输入有效的进度值 (0-100)");
                    }
                }
            }
        }
        
        // 刷新所有项目状态
        function refreshAllProjects() {
            projects.forEach(project => {
                if (project.status === 'active' && project.progress < 100) {
                    // 模拟随机进度更新
                    const increase = Math.floor(Math.random() * 5) + 1;
                    const oldProgress = project.progress;
                    project.progress = Math.min(100, project.progress + increase);
                    project.completedTasks = Math.floor((project.progress / 100) * project.tasks);
                    project.lastUpdated = getCurrentDateTime();
                    
                    if (project.progress >= 100) {
                        project.status = 'completed';
                        addUpdate(`🎉 项目自动完成：${project.title}`, "success");
                    } else if (project.progress > oldProgress) {
                        addUpdate(`🔄 项目进度自动更新：${project.title} +${increase}%`, "info");
                    }
                }
            });
            
            renderProjects();
            addUpdate("🔄 所有项目状态已刷新", "info");
        }
        
        // 创建新项目
        function createNewProject() {
            const title = prompt("请输入新项目标题：");
            if (!title) return;
            
            const description = prompt("请输入项目描述：", "新的医学科研合作项目");
            if (!description) return;
            
            const startDate = new Date().toISOString().split('T')[0];
            const endDate = new Date(Date.now() + 90 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
            
            const newProject = {
                id: projects.length + 1,
                title: title,
                description: description,
                status: "planning",
                progress: 0,
                startDate: startDate,
                endDate: endDate,
                team: "刘亦菲 + 老公",
                tasks: Math.floor(Math.random() * 10) + 5,
                completedTasks: 0,
                priority: "medium",
                lastUpdated: getCurrentDateTime()
            };
            
            projects.push(newProject);
            renderProjects();
            addUpdate(`✨ 创建新项目：${title}`, "success");
        }
        
        // 添加更新记录
        function addUpdate(message, type = "info") {
            const now = new Date();
            const timeString = now.toTimeString().split(' ')[0];
            
            const newUpdate = {
                id: updates.length + 1,
                time: timeString,
                message: message,
                type: type
            };
            
            updates.unshift(newUpdate);
            if (updates.length > 10) updates.pop();
            
            renderUpdates();
        }
        
        // 辅助函数
        function getCurrentDateTime() {
            const now = new Date();
            return now.toISOString().split('T')[0] + ' ' + now.toTimeString().split(' ')[0];
        }
        
        function getTimeRemaining(endDate) {
            const end = new Date(endDate);
            const now = new Date();
            const diff = end - now;
            
            if (diff <= 0) return "已结束";
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days > 30) {
                const months = Math.floor(days / 30);
                return `剩余时间：约${months}个月`;
            } else if (days > 0) {
                return `剩余时间：${days}天`;
            } else {
                const hours = Math.floor(diff / (1000 * 60 * 60));
                return `剩余时间：${hours}小时`;
            }
        }
        
        // 模拟实时更新
        function simulateLiveUpdates() {
            setInterval(() => {
                // 随机选择一个活跃项目进行自动更新
                const activeProjects = projects.filter(p => p.status === 'active');
                if (activeProjects.length > 0) {
                    const randomProject = activeProjects[Math.floor(Math.random() * activeProjects.length)];
                    if (randomProject.progress < 100) {
                        const increase = Math.floor(Math.random() * 3) + 1;
                        const oldProgress = randomProject.progress;
                        randomProject.progress = Math.min(100, randomProject.progress + increase);
                        randomProject.completedTasks = Math.floor((randomProject.progress / 100) * randomProject.tasks);
                        randomProject.lastUpdated = getCurrentDateTime();
                        
                        if (randomProject.progress >= 100) {
                            randomProject.status = 'completed';
                            addUpdate(`🎉 项目自动完成：${randomProject.title}`, "success");
                        } else if (randomProject.progress > oldProgress) {
                            addUpdate(`📊 项目自动更新：${randomProject.title} 进度+${increase}%`, "info");
                        }
                        
                        renderProjects();
                    }
                }
            }, 60000); // 每分钟更新一次
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderProjects();
            renderUpdates();
            simulateLiveUpdates();
            
            // 添加初始更新记录
            addUpdate("📊 科研项目监控系统已启动", "info");
            addUpdate("👋 欢迎老公查看项目实时状态！", "info");
        });
    </script>
</body>
</html>
